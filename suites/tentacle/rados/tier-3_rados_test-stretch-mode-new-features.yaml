  - test:
      name: Revert stretch mode negative scenarios
      module: test_stretch_revert.py
      polarion-id: CEPH-83620059
      config:
        stretch_bucket: datacenter
        tiebreaker_mon_site_name: tiebreaker
        delete_pool: true
        scenarios_to_run:
          - scenario13
          - scenario14
          - scenario15
          - scenario16
          - scenario17
      desc: Performs tests related to reverting from stretch mode

  # Cluster will have DC1 and DC3 as data centers
  - test:
      name: Revert stretch mode holistic tests
      module: test_stretch_revert.py
      polarion-id: CEPH-83620034
      config:
        stretch_bucket: datacenter
        tiebreaker_mon_site_name: tiebreaker
        delete_pool: true
        scenarios_to_run:
          - scenario18
      desc: Performs tests related to reverting from stretch mode

  - test:
      name: OSD compaction with failures
      module: test_osd_compaction.py
      polarion-id: CEPH-11681
      config:
        omap_config:
          pool_name: re_pool_large_omap
          large_warn: true
          obj_start: 0
          obj_end: 5
          normal_objs: 400
          num_keys_obj: 200001
        bench_config:
          pool_name: re_pool_bench
          pg_num: 128
          pgp_num: 128
        ceph_client_omap_tests:
          run_rbd_stress: true
          run_cephfs_stress: true
          rbd_config:
            pool_name: rbd_stress
            num_pools: 3
            images_per_pool: 3
            snaps_per_image: 5
            parallel_jobs: 3
            duration: 10
          cephfs_config:
            fs_name: cephfs
            num_subvols: 3
            files_per_subvol: 5
            snaps_per_subvol: 5
            parallel_jobs: 3
            volume_group: cfsstress
            duration: 10
      desc: Perform OSD compaction with & without failures, client stress tests, and OSD restart validation

  - test:
      name: Omap creations on objects
      module: test_omap_entries.py
      polarion-id: CEPH-83571702
      config:
        # Pool created to  verify the Bug#2249003
        crash_config:
          pool_name: re_pool_crash
        # EC pool config is commented out because omaps can be written only on RE pools
        omap_config:
          small_omap:
            pool_name: re_pool_small_omap
            pg_num: 1
            pg_num_max: 1
            large_warn: false
            obj_start: 0
            obj_end: 5
            normal_objs: 400
            num_keys_obj: 200000
          large_omap:
            pool_name: re_pool_large_omap
            pg_num: 1
            pg_num_max: 1
            large_warn: true
            obj_start: 0
            obj_end: 5
            normal_objs: 400
            num_keys_obj: 200001
      desc: Large number of omap creation on objects and OSD resiliency

  - test:
      name: Verification of dump scrub parameters
      desc: Verification of forced and scheduled time flags
      module: test_scrub_parameters.py
      polarion-id: CEPH-83593830
      config:
        replicated_pool:
          create: true
          pool_name: scrub_rp_pool
          pg_num: 1
        ec_pool:
          pool_name: scrub_ec_pool
          k: 2
          m: 2
          pg_num: 1

  - test:
      name: Verification of the scrub store replicated pool
      desc: Verification of scrub and deep-scrub msgs in scrub store on replicated pool
      module: test_scrub_store_errors.py
      polarion-id: CEPH-83620444
      config:
        create: true
        pool_name: scrub_pool
        pg_num_max: 1
        is_ecpool: False

  - test:
      name: Verification of the scrub queue
      desc: Verification of scrub queue in scheduled scrubs
      module: test_scrub_queue_timing.py
      polarion-id: CEPH-83620445
      config:
        create: true
        pool_name: scrub_pool
        pg_num_max: 8
        operation: "scrub"
  - test:
      name: Verification of the scrub queue
      desc: Verification of scrub queue in scheduled scrubs
      module: test_scrub_queue_timing.py
      polarion-id: CEPH-83620445
      config:
        create: true
        pool_name: scrub_pool
        pg_num_max: 8
        operation: "deep-scrub"

  - test:
      name: Case3-Verification of osd_scrub_load_threshold on EC Pool
      desc: Repair inconsistent object when threshold parameter is 10
      module: test_osd_scrub_load_threshold_parameter.py
      polarion-id: CEPH-83620201
      config:
        ec_pool:
          create: true
          pool_name: EC_pool
          pg_num: 1
        debug_enable: False
        case_to_run:
          - case3

  - test:
      name: Validation of pool-level noscrub and nodeep-scrub settings.
      desc: Verification of pool scrub settings and ensures user-initiated scrubs still run.
      module: test_scrub_flag_pool_level.py
      polarion-id: CEPH-83621444
      config:
        pool_names:
          - active_pool
          - inactive_pool